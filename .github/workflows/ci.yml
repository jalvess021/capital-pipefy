name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: |
          if [ -n "$(find . -name '*.go' -not -path './vendor/*')" ]; then
            go vet ./...
          else
            echo "No Go files yet, skipping vet"
          fi
