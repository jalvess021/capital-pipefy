services:

  # --- Infra ---
  postgres:
    image: postgres:16-alpine
    container_name: capital-pipefy-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - capital-pipefy-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - capital-pipefy-net
    restart: unless-stopped

  rabbitmq:
    profiles: [full]

  # --- Tooling ---
  migrate:
    profiles: [dev]
    image: migrate/migrate
    command: ["-path", "/migrations", "-database", "${DATABASE_URL}", "up"]
    volumes:
      - ./migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - capital-pipefy-net
    restart: on-failure

  # --- App ---
  api-dev:
    profiles: [dev]
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - capital-pipefy-net

  nginx-dev:
    profiles: [dev]
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8000}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    env_file: .env
    environment:
      - API_HOST=api-dev
    depends_on:
      - api-dev
    networks:
      - capital-pipefy-net
    restart: unless-stopped

  api:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - capital-pipefy-net
    restart: unless-stopped

  nginx:
    profiles: [prod]
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8000}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    env_file: .env
    environment:
      - API_HOST=api
    depends_on:
      - api
    networks:
      - capital-pipefy-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  capital-pipefy-net:
    driver: bridge
