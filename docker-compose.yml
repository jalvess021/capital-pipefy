services:

  api-dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - /app/vendor
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - capital-pipefy-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capital-pipefy-api
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - capital-pipefy-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: capital-pipefy-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - capital-pipefy-net
    restart: unless-stopped

  redis:
    profiles:
      [full]

  rabbitmq:
    profiles:
      [full]

  nginx:
    image: nginx:1.27-alpine
    container_name: capital-pipefy-nginx
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - capital-pipefy-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  capital-pipefy-net:
    driver: bridge
