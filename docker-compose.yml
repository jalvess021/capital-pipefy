services:

  # --- Infra ---
  postgres:
    image: postgres:16-alpine
    container_name: capital-pipefy-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - capital-pipefy-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - capital-pipefy-net
    restart: unless-stopped

  rabbitmq:
    profiles: [full]

  # --- Monitoring ---
  loki:
    image: grafana/loki:2.9.0
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - capital-pipefy-net

  promtail:
    image: grafana/promtail:2.9.0
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - capital-pipefy-net

  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - capital-pipefy-net

  # --- Tooling ---
  migrate:
    profiles: [dev]
    image: migrate/migrate
    command: ["-path", "/migrations", "-database", "${DATABASE_URL}", "up"]
    volumes:
      - ./migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - capital-pipefy-net
    restart: on-failure

  # --- App ---
  api-dev:
    profiles: [dev]
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - capital-pipefy-net

  nginx-dev:
    profiles: [dev]
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8000}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    env_file: .env
    environment:
      - API_HOST=api-dev
    depends_on:
      - api-dev
    networks:
      - capital-pipefy-net
    restart: unless-stopped

  api:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - capital-pipefy-net
    restart: unless-stopped

  nginx:
    profiles: [prod]
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8000}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    env_file: .env
    environment:
      - API_HOST=api
    depends_on:
      - api
    networks:
      - capital-pipefy-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  loki_data:
  grafana_data:

networks:
  capital-pipefy-net:
    driver: bridge
