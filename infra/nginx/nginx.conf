worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Security
    server_tokens off;

    # Compression
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    include /etc/nginx/conf.d/*.conf;
}
