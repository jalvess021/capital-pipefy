root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/capital-pipefy ./cmd/api"
  bin = "./tmp/capital-pipefy"
  full_bin = "./tmp/capital-pipefy"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "tests"]
  delay = 1000

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true